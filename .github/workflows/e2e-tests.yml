name: E2E Tests (Playwright)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-design-tokens:
    name: Lint - No hardcoded color classes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify no hardcoded Tailwind color classes in src/
        run: node scripts/check-hardcoded-colors.mjs

  seed-test-accounts:
    name: Seed E2E Test Motoristas
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      seeded: ${{ steps.seed.outputs.seeded }}

    steps:
      - name: Call seed edge function (idempotent)
        id: seed
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            -H "x-seed-token: ${{ secrets.E2E_SEED_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://bohycsldnskyuwsdxrqt.supabase.co/functions/v1/seed-test-motoristas")
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "HTTP $STATUS"
          echo "$BODY"
          if [ "$STATUS" != "200" ]; then
            echo "Seed failed with status $STATUS"
            exit 1
          fi
          echo "seeded=true" >> "$GITHUB_OUTPUT"

  rls-isolation:
    name: Storage RLS Isolation (API-only)
    needs: seed-test-accounts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run isolation test (no browser, no webserver)
        # This spec only hits the Supabase REST/Storage API, so we skip the
        # webServer + browser install for a fast safety net on every PR.
        run: |
          cat > playwright.isolation.config.ts <<'EOF'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            testDir: './e2e',
            reporter: [['list'], ['html', { open: 'never', outputFolder: 'playwright-report-isolation' }]],
            timeout: 60000,
            projects: [{ name: 'api', use: {} }],
          });
          EOF
          npx playwright test --config=playwright.isolation.config.ts e2e/motorista-isolation.spec.ts -g "Motorista A não consegue"

      - name: Upload isolation report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: rls-isolation-report
          path: playwright-report-isolation/
          retention-days: 14

  e2e:
    name: Run E2E Tests
    needs: seed-test-accounts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:4173
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: e2e/test-results/
          retention-days: 7

  cleanup-test-artifacts:
    name: Cleanup E2E Test Artifacts
    needs: [e2e, rls-isolation]
    if: ${{ always() && needs.seed-test-accounts.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Call cleanup edge function (idempotent)
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            -H "x-seed-token: ${{ secrets.E2E_SEED_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://bohycsldnskyuwsdxrqt.supabase.co/functions/v1/cleanup-test-motoristas")
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "HTTP $STATUS"
          echo "$BODY"
          if [ "$STATUS" != "200" ]; then
            echo "Cleanup failed with status $STATUS"
            exit 1
          fi
